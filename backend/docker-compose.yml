services:
  postgres:
    image: postgres:16-alpine
    container_name: niklad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: niklad
      POSTGRES_PASSWORD: niklad
      POSTGRES_DB: niklad
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_articles.sql:/docker-entrypoint-initdb.d/002_articles.sql:ro
      - ./migrations/003_organizations.sql:/docker-entrypoint-initdb.d/003_organizations.sql:ro
      - ./migrations/004_organizations_seed.sql:/docker-entrypoint-initdb.d/004_organizations_seed.sql:ro
      - ./migrations/005_ratings.sql:/docker-entrypoint-initdb.d/005_ratings.sql:ro
      - ./migrations/006_reviews.sql:/docker-entrypoint-initdb.d/006_reviews.sql:ro
      - ./migrations/007_fix_catalog_encoding.sql:/docker-entrypoint-initdb.d/007_fix_catalog_encoding.sql:ro
      - ./migrations/008_dc_mining_import.sql:/docker-entrypoint-initdb.d/008_dc_mining_import.sql:ro
      - ./migrations/009_gis_mining_import.sql:/docker-entrypoint-initdb.d/009_gis_mining_import.sql:ro
      - ./migrations/010_organization_catalog_db.sql:/docker-entrypoint-initdb.d/010_organization_catalog_db.sql:ro
      - ./migrations/011_mining_hotels_import.sql:/docker-entrypoint-initdb.d/011_mining_hotels_import.sql:ro
      - ./migrations/012_mining_pools_import.sql:/docker-entrypoint-initdb.d/012_mining_pools_import.sql:ro
      - ./migrations/013_crypto_exchanges_import.sql:/docker-entrypoint-initdb.d/013_crypto_exchanges_import.sql:ro
      - ./migrations/014_sync_rating_from_reviews.sql:/docker-entrypoint-initdb.d/014_sync_rating_from_reviews.sql:ro
      - ./migrations/015_crypto_wallets_import.sql:/docker-entrypoint-initdb.d/015_crypto_wallets_import.sql:ro
      - ./migrations/016_core_media_and_links.sql:/docker-entrypoint-initdb.d/016_core_media_and_links.sql:ro
      - ./migrations/017_hardware_domain.sql:/docker-entrypoint-initdb.d/017_hardware_domain.sql:ro
      - ./migrations/018_article_blocks.sql:/docker-entrypoint-initdb.d/018_article_blocks.sql:ro
      - ./migrations/019_rating_autosync.sql:/docker-entrypoint-initdb.d/019_rating_autosync.sql:ro
      - ./migrations/021_ratings_home_flags.sql:/docker-entrypoint-initdb.d/021_ratings_home_flags.sql:ro

volumes:
  postgres_data:
